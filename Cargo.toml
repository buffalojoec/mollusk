[workspace]
members = [
    "bencher",
    "harness",
    "test-programs/cpi-target",
    "test-programs/primary",
]
resolver = "2"

[workspace.package]
authors = ["Joe Caulfield <jcaulfield135@gmail.com>"]
repository = "https://github.com/buffalojoec/mollusk"
license = "MIT"
edition = "2021"
version = "0.0.3"

[workspace.dependencies]
bincode = "1.3.3"
chrono = "0.4.38"
criterion = "0.5.1"
mollusk-svm = { path = "harness", version = "0.0.3" }
mollusk-svm-bencher = { path = "bencher", version = "0.0.3" }
num-format = "0.4.4"
serde_json = "1.0.117"
solana-bpf-loader-program = { git = "https://github.com/anza-xyz/agave.git", rev = "75450a6542164ee4f64cadc7a97a24d25ff37e2a" }
solana-compute-budget = { git = "https://github.com/anza-xyz/agave.git", rev = "75450a6542164ee4f64cadc7a97a24d25ff37e2a" }
solana-logger = { git = "https://github.com/anza-xyz/agave.git", rev = "75450a6542164ee4f64cadc7a97a24d25ff37e2a" }
solana-program = { git = "https://github.com/anza-xyz/agave.git", rev = "75450a6542164ee4f64cadc7a97a24d25ff37e2a" }
solana-program-runtime = { git = "https://github.com/anza-xyz/agave.git", rev = "75450a6542164ee4f64cadc7a97a24d25ff37e2a" }
solana-system-program = { git = "https://github.com/anza-xyz/agave.git", rev = "75450a6542164ee4f64cadc7a97a24d25ff37e2a" }
solana-sdk = { git = "https://github.com/anza-xyz/agave.git", rev = "75450a6542164ee4f64cadc7a97a24d25ff37e2a" }
solana-timings = { git = "https://github.com/anza-xyz/agave.git", rev = "75450a6542164ee4f64cadc7a97a24d25ff37e2a" }
